# 华鼎模板默认值
huading_template:
  # 31 字段顺序（v5.11.2 统一从这里读，消除了 __init__.py 与 tools/_template_generator.py 双重定义）
  fields:
    - "序号"
    - "门店编号"
    - "门店三方编码"
    - "仓库编码"
    - "加急程度\n（0：普通，1：加急）"
    - "商品SKU编号"
    - "商品三方SPEC编号"
    - "单位类型"
    - "出库数量"
    - "指定库存状态"
    - "出库类型"
    - "配送方式"
    - "指定车型（专配）"
    - "是否垫付"
    - "付款方式"
    - "快递公司"
    - "单价"
    - "总金额"
    - "是否制定批次"
    - "批次号"
    - "生产日期"
    - "备注"
    - "生产厂家编号"
    - "门店收货地址编码"
    - "三方单号"
    - "业务模式"
    - "业务类型"
    - "收货人"
    - "联系电话"
    - "收货地址"
    - "C端快递公司"

  defaults:
    出库类型: "201"              # 销售出库
    配送方式: "共配"
    指定库存状态: "正常"
    是否垫付: "否"
    加急程度: 0                  # 0=普通
    是否制定批次: "否"
    业务类型: ""
    业务模式: ""
    门店三方编码: ""
    商品三方SPEC编号: ""
    指定车型（专配）: ""
    付款方式: ""
    快递公司: ""
    单价: ""
    总金额: ""
    批次号: ""
    生产日期: ""
    生产厂家编号: ""
    门店收货地址编码: ""
    C端快递公司: ""
